# node-pty is the only dependency whose native build we actually need.
allowBuilds:
  '@prisma/engines': set this to true or false
  esbuild: set this to true or false
  msw: set this to true or false
  node-pty: true
  prisma: set this to true or false
  sharp: set this to true or false

# Other transitive deps (sharp, msw, …) ship prebuilt binaries or only need
# their build scripts for browser/dev use, so we don't build them. pnpm v11
# defaults strictDepBuilds=true, which turns those *ignored* builds into a hard
# install failure. Turn it off so they're skipped quietly instead of breaking
# the Docker build every time a new transitive dep adds a postinstall script.
strictDepBuilds: false
