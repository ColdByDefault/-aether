services:
  postgres:
    image: postgres:17-alpine
    container_name: server-dashboard-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dashboard}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-dashboard}
    # Bound to loopback only — `dashboard` uses network_mode: host so it reaches
    # this via localhost:5432, not compose DNS.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: server-dashboard
    network_mode: host
    pid: "host"
    privileged: true
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SERVER_IP=${SERVER_IP:-localhost}
      - SERVER_HOSTNAME=${SERVER_HOSTNAME:-localhost}
      - HERMES_PORT=${HERMES_PORT:-9119}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - NGINX_PORT=${NGINX_PORT:-80}
    extra_hosts:
      - "host.docker.internal:127.0.0.1"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

volumes:
  postgres_data:
